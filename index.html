// ============ Helpers ============
const pad = (n) => String(n).padStart(2, '0');
const formatKey = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
const todayKey = () => formatKey(new Date());
const parseKey = (key) => { const [y, m, d] = key.split('-').map(Number); return new Date(y, m - 1, d); };
const formatKorean = (key) => {
  const date = parseKey(key);
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return {
    full: `${date.getFullYear()}.${pad(date.getMonth() + 1)}.${pad(date.getDate())}`,
    long: `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`,
    day: `${days[date.getDay()]}요일`,
    short: `${date.getMonth() + 1}/${date.getDate()}`
  };
};
const addDays = (key, days) => { const d = parseKey(key); d.setDate(d.getDate() + days); return formatKey(d); };
const daysBetween = (fromKey, toKey) => {
  const a = parseKey(fromKey); const b = parseKey(toKey);
  return Math.round((b - a) / (24 * 60 * 60 * 1000));
};
const getRecentKeys = (n, fromKey = todayKey()) => {
  const keys = [];
  for (let i = 0; i < n; i++) keys.push(addDays(fromKey, -i));
  return keys;
};
const getMonthKeys = (key = todayKey()) => {
  const d = parseKey(key);
  const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  const keys = [];
  for (let i = 1; i <= last; i++) keys.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(i)}`);
  return keys;
};
const daysLeft = (futureMs) => Math.max(0, Math.ceil((futureMs - Date.now()) / (24 * 60 * 60 * 1000)));

function suggestCategory(text) {
  const t = (text || '').toLowerCase();
  if (!t.trim()) return null;
  let best = null; let bestScore = 0;
  Object.keys(KEYWORDS).forEach(cat => {
    let s = 0;
    KEYWORDS[cat].forEach(k => { if (t.includes(k)) s++; });
    if (s > bestScore) { bestScore = s; best = cat; }
  });
  return best;
}

    if (remember30) {
      const expiry = Date.now() + UNLOCK_DURATION_MS;
      try { await window.storage.set(UNLOCK_KEY, String(expiry)); } catch (e) { }
      setUnlockExpiry(expiry);
    } else { setUnlockExpiry(null); }
    setAuthed(true);
  }

  async function handleLock() {
    try { await window.storage.delete(UNLOCK_KEY); } catch (e) { }
    setUnlockExpiry(null); setAuthed(false);
  }

  if (checking) return <div style={{ background: T.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: fontEN, fontStyle: 'italic', color: T.inkFaint }}>loading...</div>;
  if (!authed) return <PasswordGate onAuth={handleAuth} />;
  return <WisePlanner unlockExpiry={unlockExpiry} onLock={handleLock} />;
}

// ============ Main Planner ============
function WisePlanner({ unlockExpiry, onLock }) {
  const [view, setView] = useState('today');
  const [date, setDate] = useState(todayKey());
  const [data, setData] = useState({});
  const [config, setConfig] = useState(defaultConfig);
  const [loading, setLoading] = useState(true);
  const [showCalendar, setShowCalendar] = useState(false);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(DATA_KEY);
        if (r && r.value) { setData(migrateData(JSON.parse(r.value))); }
        else { await window.storage.set(DATA_KEY, JSON.stringify(SEED)); setData(migrateData(SEED)); }
      } catch (e) {
        try { await window.storage.set(DATA_KEY, JSON.stringify(SEED)); setData(migrateData(SEED)); } catch (e2) { setData(migrateData(SEED)); }
      }
      try {
        const cr = await window.storage.get(CONFIG_KEY);
        if (cr && cr.value) setConfig({ ...defaultConfig, ...JSON.parse(cr.value) });
        else { await window.storage.set(CONFIG_KEY, JSON.stringify(defaultConfig)); }
      } catch (e) { }
      setLoading(false);
    })();
  }, []);

  async function persist(next) {
    setData(next);
    try { await window.storage.set(DATA_KEY, JSON.stringify(next)); } catch (e) { }
  }
  async function persistConfig(next) {
    setConfig(next);
    try { await window.storage.set(CONFIG_KEY, JSON.stringify(next)); } catch (e) { }
  }
  function updateDay(key, updater) {
    const cur = data[key] || emptyDay();
    persist({ ...data, [key]: updater(cur) });
  }
  function jumpTo(key) { setDate(key); setView('today'); }

  if (loading) return <div style={{ background: T.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: fontEN, fontStyle: 'italic', color: T.inkFaint }}>loading...</div>;

  return (
    <div style={{ background: T.bg, color: T.ink, minHeight: '100vh', paddingBottom: 80, fontFamily: fontBody, fontSize: 14, lineHeight: 1.7 }}>
      <Header
        view={view} setView={setView}
        date={date} setDate={setDate}
        unlockExpiry={unlockExpiry} onLock={onLock}
        showCalendar={showCalendar} setShowCalendar={setShowCalendar}
        onOpenSettings={() => setShowSettings(true)}
        data={data}
      />
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '16px' }}>
        {view === 'today' && <TodayView dayData={data[date] || emptyDay()} dateKey={date} updateDay={updateDay} config={config} />}
        {view === 'week' && <WeekView data={data} fromKey={date} setDate={jumpTo} />}
        {view === 'month' && <MonthView data={data} fromKey={date} setDate={jumpTo} />}
        {view === 'history' && <HistoryView data={data} setDate={jumpTo} />}
      </div>
      <Footer />
      {showSettings && (
        <SettingsSheet
          config={config} onSaveConfig={persistConfig}
          data={data} onReplaceData={persist}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

// ============ Calendar Picker ============
function CalendarPicker({ data, currentDate, onSelect }) {
  const [view, setView] = useState(parseKey(currentDate));
  const today = todayKey();

  const firstDay = new Date(view.getFullYear(), view.getMonth(), 1);
  const lastDay = new Date(view.getFullYear(), view.getMonth() + 1, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  function nav(delta) {
    const d = new Date(view); d.setMonth(d.getMonth() + delta); setView(d);
  }
  function dateKeyFor(d) { return formatKey(new Date(view.getFullYear(), view.getMonth(), d)); }

  return (
    <div style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 12, padding: 14, marginBottom: 10 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <button onClick={() => nav(-1)} style={{ ...navBtn, padding: 5, background: T.cardWhite }}><ChevronLeft size={14} /></button>
        <div style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 14, color: T.ink }}>
          {view.getFullYear()}년 {view.getMonth() + 1}월
        </div>
        <button onClick={() => nav(1)} style={{ ...navBtn, padding: 5, background: T.cardWhite }}><ChevronRight size={14} /></button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 4 }}>
        {['일', '월', '화', '수', '목', '금', '토'].map((w, i) => (
          <div key={w} style={{ textAlign: 'center', fontSize: 10, color: i === 0 ? T.rose : i === 6 ? T.blue : T.inkFaint, fontWeight: 600, padding: '4px 0' }}>{w}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const k = dateKeyFor(d);
          const has = dayHasData(data[k]);
          const isToday = k === today;
          const isSel = k === currentDate;
          const dow = (startWeekday + d - 1) % 7;
          const baseColor = dow === 0 ? T.rose : dow === 6 ? T.blue : T.ink;
          return (
            <button key={i} onClick={() => onSelect(k)} style={{
              aspectRatio: '1 / 1',
              background: isSel ? T.accent : isToday ? T.accentSoft : T.cardWhite,
              border: isSel ? `1px solid ${T.accent}` : isToday ? `1px solid ${T.accent}` : `1px solid ${T.borderSoft}`,
              borderRadius: 8, cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              padding: 0, position: 'relative',
              color: isSel ? '#fff' : baseColor,
              fontSize: 13, fontWeight: isSel || isToday ? 700 : 500,
              fontFamily: fontBody, transition: 'all 0.1s'
            }}>
              {d}
              {has && (
                <div style={{
                  position: 'absolute', bottom: 4, width: 4, height: 4, borderRadius: '50%',
                  background: isSel ? '#fff' : T.accent
                }} />
              )}
            </button>
          );
        })}
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 10, color: T.inkFaint, fontFamily: fontEN, fontStyle: 'italic' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ width: 4, height: 4, borderRadius: '50%', background: T.accent }} /> recorded
        </span>
        <button onClick={() => onSelect(today)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: T.accent, fontFamily: fontEN, fontStyle: 'italic', fontSize: 11 }}>
          → today
        </button>
      </div>
    </div>
  );
}

// ============ Today View ============
function TodayView({ dayData, dateKey, updateDay, config }) {
  const totalT = dayData.tasks.length;
  const compT = dayData.tasks.filter(t => t.completed).length;
  const hasGoal = dayData.oneGoal.text.trim() !== '';
  const goalDone = hasGoal && dayData.oneGoal.completed;
  const totalItems = totalT + (hasGoal ? 1 : 0);
  const compItems = compT + (goalDone ? 1 : 0);
  const pct = totalItems === 0 ? 0 : Math.round(compItems / totalItems * 100);

  const u = (fn) => updateDay(dateKey, fn);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14, paddingTop: 14 }}>
      <NorthStarCard config={config} dateKey={dateKey} />
      <ProgressGauge pct={pct} done={compItems} total={totalItems} goalDone={goalDone} hasGoal={hasGoal} />

      <OneGoalCard
        goal={dayData.oneGoal}
        onSetText={(text) => u(d => ({ ...d, oneGoal: { ...d.oneGoal, text } }))}
        onToggle={() => u(d => ({ ...d, oneGoal: { ...d.oneGoal, completed: !d.oneGoal.completed } }))}
      />

      <TaskList
        tasks={dayData.tasks} locked={!goalDone}
        onAdd={(text) => { if (text.trim()) u(d => ({ ...d, tasks: [...d.tasks, { id: Date.now() + '', text: text.trim(), completed: false }] })); }}
        onToggle={(id) => u(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t) }))}
        onRemove={(id) => u(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id) }))}
      />

      <QuickCapture onFile={(cat, text) => u(d => ({ ...d, [cat]: [...(d[cat] || []), text] }))} onSetInsight={(text) => u(d => ({ ...d, insight: text }))} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 14 }}>
        <ListSection title="실제 액션한 일" subtitle="actions" items={dayData.actions} color={T.success} icon={<Zap size={14} color={T.success} />}
          onAdd={(text) => u(d => ({ ...d, actions: [...d.actions, text] }))}

        <ListSection title="생각만 한 일" subtitle="thoughts only" items={dayData.thoughts} color={T.warn} icon={<Brain size={14} color={T.warn} />}
          onAdd={(text) => u(d => ({ ...d, thoughts: [...d.thoughts, text] }))}
          onRemove={(i) => u(d => ({ ...d, thoughts: d.thoughts.filter((_, idx) => idx !== i) }))} />
        <ListSection title="앞으로 나아간 일" subtitle="moved forward" items={dayData.progress} color={T.success} icon={<ArrowRight size={14} color={T.success} />}
          onAdd={(text) => u(d => ({ ...d, progress: [...d.progress, text] }))}
          onRemove={(i) => u(d => ({ ...d, progress: d.progress.filter((_, idx) => idx !== i) }))} />
        <ListSection title="나아가지 못한 일" subtitle="stuck" items={dayData.stuck} color={T.rose} icon={<Pause size={14} color={T.rose} />}
          onAdd={(text) => u(d => ({ ...d, stuck: [...d.stuck, text] }))}
          onRemove={(i) => u(d => ({ ...d, stuck: d.stuck.filter((_, idx) => idx !== i) }))} />
      </div>

      <InsightCard insight={dayData.insight} onSet={(text) => u(d => ({ ...d, insight: text }))} />

      <ListSection title="잘한 것 / 발견" subtitle="wins" items={dayData.wins} color={T.success} icon={<Trophy size={14} color={T.success} />}
        onAdd={(text) => u(d => ({ ...d, wins: [...d.wins, text] }))}

function QuickCapture({ onFile, onSetInsight }) {
  const [text, setText] = useState('');
  const [flash, setFlash] = useState('');
  const suggested = useMemo(() => suggestCategory(text), [text]);

  function file(cat) {
    const t = text.trim();
    if (!t) return;
    if (cat === 'insight') { onSetInsight(t); }

// ============ Settings Sheet ============
function SettingsSheet({ config, onSaveConfig, data, onReplaceData, onClose }) {
  const [dDay, setDDay] = useState(config.dDay || '');
  const [dDayLabel, setDDayLabel] = useState(config.dDayLabel || '런칭');
  const [importMessage, setImportMessage] = useState('');
  const fileInputRef = useRef(null);

  function saveConfig() {
    onSaveConfig({ ...config, dDay, dDayLabel });
    onClose();
  }

  function downloadJSON() {
    const payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      config,
      data
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `wise-planner-${todayKey()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleFile(e, mode) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = parsed.data || parsed;
        if (typeof incoming !== 'object' || Array.isArray(incoming)) throw new Error('형식 오류');
        let merged;
        if (mode === 'replace') {
          merged = migrateData(incoming);
        } else {
          merged = { ...data };
          Object.keys(incoming).forEach(k => {
            const cleanD = migrateDay(incoming[k]);
            merged[k] = merged[k] ? mergeDay(merged[k], cleanD) : cleanD;
          });
        }
        onReplaceData(merged);
        if (parsed.config) onSaveConfig({ ...config, ...parsed.config });
        const count = Object.keys(incoming).length;
        setImportMessage(`✓ ${count}일 ${mode === 'replace' ? '교체' : '병합'} 완료`);
        setTimeout(() => setImportMessage(''), 3000);
      } catch (err) {
        setImportMessage('✗ JSON 파일 형식이 잘못되었습니다');
        setTimeout(() => setImportMessage(''), 3000);
      }
      if (fileInputRef.current) fileInputRef.current.value = '';
    };
    reader.readAsText(file);
  }

  function mergeDay(a, b) {
    return {
      ...a, ...b,
      oneGoal: b.oneGoal?.text ? b.oneGoal : a.oneGoal,
      tasks: [...(a.tasks || []), ...(b.tasks || [])],
      actions: Array.from(new Set([...(a.actions || []), ...(b.actions || [])])),
      thoughts: Array.from(new Set([...(a.thoughts || []), ...(b.thoughts || [])])),
      progress: Array.from(new Set([...(a.progress || []), ...(b.progress || [])])),
      stuck: Array.from(new Set([...(a.stuck || []), ...(b.stuck || [])])),
      wins: Array.from(new Set([...(a.wins || []), ...(b.wins || [])])),
      blockers: Array.from(new Set([...(a.blockers || []), ...(b.blockers || [])])),
      shifts: Array.from(new Set([...(a.shifts || []), ...(b.shifts || [])])),
      journal: a.journal || b.journal,
      insight: a.insight || b.insight
    };
  }

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 100, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.bg, width: '100%', maxWidth: 720, maxHeight: '90vh',
        borderRadius: '20px 20px 0 0', overflow: 'auto', padding: '20px 18px 32px'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
          <div>
            <div style={{ ...subEN, color: T.accent, margin: 0 }}>Settings</div>
            <div style={{ fontFamily: fontDisplay, fontSize: 20, fontWeight: 700, marginTop: 2 }}>설정</div>
          </div>
          <button onClick={onClose} style={{ ...navBtn, background: T.cardWhite }}><X size={18} /></button>
        </div>

        {/* D-Day */}
        <div style={{ ...cardStyle, marginBottom: 14, background: T.cardWhite }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <Target size={14} color={T.accent} />
            <div style={{ ...subEN, margin: 0 }}>D-Day</div>
          </div>
          <div style={{ fontFamily: fontDisplay, fontSize: 16, fontWeight: 700, marginBottom: 12 }}>런칭 D-Day 설정</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div>
              <label style={{ fontSize: 12, color: T.inkFaint, marginBottom: 4, display: 'block' }}>날짜</label>
              <input type="date" value={dDay} onChange={e => setDDay(e.target.value)}
                style={{ width: '100%', padding: '10px 12px', border: `1px solid ${T.border}`, borderRadius: 9, fontSize: 14, fontFamily: fontBody, background: T.bg, color: T.ink, outline: 'none' }} />
            </div>
            <div>
              <label style={{ fontSize: 12, color: T.inkFaint, marginBottom: 4, display: 'block' }}>이름</label>
              <input type="text" value={dDayLabel} onChange={e => setDDayLabel(e.target.value)}
                placeholder="런칭, 출시, 발표..."
                style={{ width: '100%', padding: '10px 12px', border: `1px solid ${T.border}`, borderRadius: 9, fontSize: 14, fontFamily: fontBody, background: T.bg, color: T.ink, outline: 'none' }} />
            </div>
            <button onClick={saveConfig} style={{ ...primaryBtn, padding: '11px 16px' }}>저장</button>
          </div>
        </div>

        {/* JSON */}
        <div style={{ ...cardStyle, marginBottom: 14, background: T.cardWhite }}>

// ============ Summary Logic ============
function buildSummary(data, keys) {
  const list = keys.map(k => ({ key: k, day: data[k] || null })).filter(x => x.day);
  const recorded = list.filter(x => dayHasData(x.day));

  const goalsSet = recorded.filter(x => x.day.oneGoal.text.trim());
  const goalsDone = goalsSet.filter(x => x.day.oneGoal.completed);

  const allTasks = [];
  recorded.forEach(x => { x.day.tasks.forEach(t => allTasks.push({ ...t, key: x.key })); });
  const completedTasks = allTasks.filter(t => t.completed);
  const pendingTasks = allTasks.filter(t => !t.completed);

  const collect = (field) => {
    const out = [];
    recorded.forEach(x => (x.day[field] || []).forEach(v => out.push({ text: v, key: x.key })));
    return out;
  };
  const allWins = collect('wins');
  const allBlockers = collect('blockers');
  const allShifts = collect('shifts');
  const allActions = collect('actions');
  const allThoughts = collect('thoughts');
  const allProgress = collect('progress');
  const allStuck = collect('stuck');

  const allInsights = [];
  recorded.forEach(x => { if (x.day.insight && x.day.insight.trim()) allInsights.push({ text: x.day.insight, key: x.key }); });

  return {
    totalDays: keys.length,
    recordedCount: recorded.length,
    goalsSetCount: goalsSet.length,
    goalsDoneCount: goalsDone.length,
    goalCompletionRate: goalsSet.length === 0 ? 0 : Math.round(goalsDone.length / goalsSet.length * 100),
    allTasks, completedTasks, pendingTasks,
    taskRate: allTasks.length === 0 ? 0 : Math.round(completedTasks.length / allTasks.length * 100),
    allActions, allThoughts, allProgress, allStuck,
    allWins, allBlockers, allShifts, allInsights,
    completedGoals: goalsDone.map(x => ({ text: x.day.oneGoal.text, key: x.key })),
    incompleteGoals: goalsSet.filter(x => !x.day.oneGoal.completed).map(x => ({ text: x.day.oneGoal.text, key: x.key })),
    recordedRate: keys.length === 0 ? 0 : Math.round(recorded.length / keys.length * 100)
  };
}

// ============ Auto Diagnosis ============
function AutoDiagnosis({ summary: s }) {
  const diagnoses = [];

  if (s.goalCompletionRate >= 80) diagnoses.push({ type: 'win', text: `핵심 목표 달성률 ${s.goalCompletionRate}% — 매우 우수.` });
  else if (s.goalCompletionRate >= 50) diagnoses.push({ type: 'mid', text: `핵심 목표 달성률 ${s.goalCompletionRate}% — 절반 이상. 미완료 목표의 공통 원인을 찾으세요.` });
  else if (s.goalsSetCount > 0) diagnoses.push({ type: 'warn', text: `핵심 목표 달성률 ${s.goalCompletionRate}% — 목표가 너무 크거나, 우선순위 충돌 가능성.` });

  // 액션 vs 생각만
  const actVsThought = s.allActions.length + s.allThoughts.length;
  if (actVsThought >= 4) {
    const actRatio = s.allActions.length / actVsThought;
    if (actRatio < 0.3) {
      diagnoses.push({ type: 'warn', text: `생각만 ${s.allThoughts.length}건 vs 실제 액션 ${s.allActions.length}건 — 사고 과잉. 가장 작은 실행 1개를 즉시 시작하세요.` });
    } else if (actRatio > 0.7) {
      diagnoses.push({ type: 'win', text: `실제 액션 ${s.allActions.length}건 vs 생각만 ${s.allThoughts.length}건 — 행동력이 우세합니다.` });
    }
  }

  // 진전 vs 정체
  const progStuck = s.allProgress.length + s.allStuck.length;
  if (progStuck >= 4) {
    const prRatio = s.allProgress.length / progStuck;
    if (prRatio < 0.3) {
      diagnoses.push({ type: 'warn', text: `정체 ${s.allStuck.length}건 vs 진전 ${s.allProgress.length}건 — 정체 패턴. 가장 작은 첫 걸음 1개를 정의하세요.` });
    } else if (prRatio > 0.7) {
      diagnoses.push({ type: 'win', text: `진전 ${s.allProgress.length}건 — 흐름이 살아 있습니다.` });
    }
  }

  if (s.allTasks.length >= 5) {
    if (s.taskRate >= 70) diagnoses.push({ type: 'win', text: `태스크 완료율 ${s.taskRate}% — 실행력이 높습니다.` });
    else if (s.taskRate < 40) diagnoses.push({ type: 'warn', text: `태스크 완료율 ${s.taskRate}% — 미완료 ${s.pendingTasks.length}건. 이월 vs 폐기 결정이 필요합니다.` });
  }
  if (s.pendingTasks.length >= 7) diagnoses.push({ type: 'warn', text: `미완료 태스크 ${s.pendingTasks.length}건 누적 — 하루 3~5개로 축소 권장.` });

  if (s.recordedRate < 50 && s.totalDays > 1) diagnoses.push({ type: 'warn', text: `기록 일관성 ${s.recordedRate}% — 매일 1분이라도 기록하는 루틴이 필요.` });
  else if (s.recordedRate >= 80 && s.totalDays > 3) diagnoses.push({ type: 'win', text: `기록 일관성 ${s.recordedRate}% — 매일 기록 습관이 자리잡고 있습니다.` });

  if (s.allBlockers.length >= 5) diagnoses.push({ type: 'mid', text: `병목 ${s.allBlockers.length}건 누적 — 가장 자주 등장하는 병목 1개를 다음 핵심 목표로 분리하세요.` });
  if (s.allShifts.length === 0 && s.recordedCount >= 3) diagnoses.push({ type: 'mid', text: '사고 변화 기록이 비어 있음 — 어떤 관점이 바뀌었는지 의식적으로 적어보세요.' });
  else if (s.allShifts.length >= 3) diagnoses.push({ type: 'win', text: `사고 변화 ${s.allShifts.length}건 — 메타인지가 활발히 작동 중.` });

  if (diagnoses.length === 0) diagnoses.push({ type: 'mid', text: '데이터가 더 쌓이면 자동 진단이 더 정확해집니다.' });

  const colorMap = {
    win: { bg: T.successSoft, border: T.success, icon: <Trophy size={13} color={T.success} /> },
    mid: { bg: T.warnSoft, border: T.warn, icon: <Target size={13} color={T.warn} /> },
    warn: { bg: T.roseSoft, border: T.rose, icon: <AlertCircle size={13} color={T.rose} /> },
  };

  return (
    <div style={cardStyle}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <Sparkles size={14} color={T.accent} />
        <div style={{ ...subEN, margin: 0 }}>Auto Diagnosis</div>
      </div>
      <div style={{ fontFamily: fontDisplay, fontSize: 16, fontWeight: 700, marginBottom: 12 }}>자동 진단</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {diagnoses.map((d, i) => {
          const c = colorMap[d.type];
          return (
            <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 12px', background: c.bg, borderLeft: `3px solid ${c.border}`, borderRadius: 7, alignItems: 'flex-start' }}>
              <div style={{ marginTop: 3 }}>{c.icon}</div>
              <div style={{ flex: 1, fontSize: 13, lineHeight: 1.6, color: T.ink }}>{d.text}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [collapsed, setCollapsed] = useState(collapsible || false);
  if (items.length === 0 && !emptyText) return null;
  const visible = collapsed ? items.slice(0, 3) : items;

  return (
    <div style={cardStyle}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        {icon}
        <div style={{ ...subEN, color, margin: 0 }}>{subtitle}</div>
        {items.length > 0 && (<div style={{ marginLeft: 'auto', fontFamily: fontEN, fontSize: 12, fontStyle: 'italic', color: T.inkFaint }}>{items.length}건</div>)}
      </div>
      <div style={{ fontFamily: fontDisplay, fontSize: 15, fontWeight: 700, marginBottom: 12 }}>{title}</div>
      {items.length === 0 ? (
        <div style={{ fontSize: 12, color: T.inkFaint, fontStyle: 'italic' }}>{emptyText}</div>
      ) : (
        <React.Fragment>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            {visible.map((item, i) => (
              <div key={i} onClick={() => setDate && item.key && setDate(item.key)}
                style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '9px 4px', borderBottom: i < visible.length - 1 ? `1px dashed ${T.borderSoft}` : 'none', cursor: setDate && item.key ? 'pointer' : 'default', borderRadius: 4, transition: 'background 0.15s' }}
                onMouseEnter={e => { if (setDate && item.key) e.currentTarget.style.background = T.bg; }}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <div style={{ width: 5, height: 5, borderRadius: 999, background: color, marginTop: 9, flexShrink: 0 }} />
                <div style={{ flex: 1, fontSize: 13, lineHeight: 1.65, color: T.inkSoft }}>{item.text}</div>
                <div style={{ fontFamily: fontEN, fontSize: 11, color: T.inkFaint, fontStyle: 'italic', marginTop: 2 }}>{item.meta}</div>
              </div>
            ))}
          </div>
          {collapsible && items.length > 3 && (

              {collapsed ? `+ ${items.length - 3} more` : 'collapse'}

    </div>
  );

  return <SummaryView data={data} keys={keys} label="Week" period="주간" range={range} setDate={setDate} />;
}
function MonthView({ data, fromKey, setDate }) {

function HistoryView({ data, setDate }) {

        <div style={{ fontSize: 13, color: T.inkFaint }}>오늘 첫 기록을 시작하세요</div>
      </div>
    );
  }

  return (
    <div style={{ paddingTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ ...cardStyle }}>
        <div style={{ ...subEN, margin: 0 }}>All Records</div>

        <div style={{ fontSize: 12, color: T.inkFaint, fontFamily: fontEN, fontStyle: 'italic', marginTop: 2 }}>tap to view</div>
      </div>

      {keys.map(k => {
        const d = data[k];
        const totalT = d.tasks.length;
        const compT = d.tasks.filter(t => t.completed).length;
        const hasGoal = d.oneGoal.text.trim() !== '';
        const goalDone = hasGoal && d.oneGoal.completed;
        const total = totalT + (hasGoal ? 1 : 0);
        const comp = compT + (goalDone ? 1 : 0);
        const pct = total === 0 ? 0 : Math.round(comp / total * 100);
        const dKor = formatKorean(k);

        return (
          <button key={k} onClick={() => setDate(k)} style={{ ...cardStyle, cursor: 'pointer', textAlign: 'left', border: `1px solid ${T.border}`, fontFamily: fontBody, transition: 'all 0.15s', width: '100%' }}
            onMouseEnter={e => e.currentTarget.style.borderColor = T.accent}
            onMouseLeave={e => e.currentTarget.style.borderColor = T.border}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
              <div>
                <div style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, color: T.ink }}>{dKor.long}</div>
                <div style={{ fontSize: 11, color: T.inkFaint, fontFamily: fontEN, fontStyle: 'italic', marginTop: 1 }}>{dKor.day}</div>
              </div>
              <div style={{ fontFamily: fontEN, fontSize: 22, fontWeight: 600, color: pct === 100 ? T.success : pct >= 50 ? T.accent : T.inkFaint, lineHeight: 1 }}>
                {pct}<span style={{ fontSize: 13 }}>%</span>
              </div>
            </div>
            {hasGoal && (
              <div style={{ fontSize: 13, color: T.inkSoft, marginTop: 4, display: 'flex', alignItems: 'center', gap: 6 }}>
                {goalDone ? <CheckCircle2 size={12} color={T.success} /> : <Lock size={11} color={T.inkFaint} />}
                <span style={{ flex: 1, textDecoration: goalDone ? 'line-through' : 'none', lineHeight: 1.5, color: goalDone ? T.inkFaint : T.ink }}>
                  {d.oneGoal.text.length > 60 ? d.oneGoal.text.slice(0, 60) + '...' : d.oneGoal.text}
                </span>
              </div>
            )}
            <div style={{ marginTop: 10, height: 4, background: T.borderSoft, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${pct}%`, background: pct === 100 ? T.success : T.accent, borderRadius: 999, transition: 'width 0.3s' }} />
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 10, fontSize: 11, color: T.inkFaint, fontFamily: fontEN, fontStyle: 'italic', flexWrap: 'wrap' }}>
              {d.tasks.length > 0 && <span>☐ {d.tasks.length}</span>}
              {d.actions?.length > 0 && <span style={{ color: T.success }}>⚡ {d.actions.length}</span>}
              {d.thoughts?.length > 0 && <span style={{ color: T.warn }}>◌ {d.thoughts.length}</span>}
              {d.progress?.length > 0 && <span style={{ color: T.success }}>→ {d.progress.length}</span>}
              {d.stuck?.length > 0 && <span style={{ color: T.rose }}>‖ {d.stuck.length}</span>}
              {d.wins.length > 0 && <span>★ {d.wins.length}</span>}
              {d.blockers.length > 0 && <span>! {d.blockers.length}</span>}
              {d.shifts.length > 0 && <span>↻ {d.shifts.length}</span>}
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ============ Footer ============
function Footer() {
  return (
    <div style={{ maxWidth: 720, margin: '40px auto 0', padding: '24px 16px 0', textAlign: 'center', borderTop: `1px solid ${T.border}` }}>
      <div style={{ fontFamily: fontEN, fontStyle: 'italic', fontSize: 12, color: T.inkFaint, letterSpacing: '0.1em' }}>
        <span style={{ color: T.accent }}>❦</span> for warmrel <span style={{ color: T.accent }}>❦</span>
      </div>
      <div style={{ fontSize: 10, color: T.inkFaint, marginTop: 6, letterSpacing: '0.2em', textTransform: 'uppercase', fontFamily: fontEN }}>
        record · zero anxiety · execute · earn
      </div>
    </div>
  );
}

// ============ Mount ============
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
